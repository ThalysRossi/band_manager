          format: uuid
        bandId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - pending_payment
            - finalized
            - canceled
        total:
          $ref: '#/components/schemas/Money'
        expectedProfit:
          $ref: '#/components/schemas/SignedMoney'
        items:
          type: array
          items:
            $ref: '#/components/schemas/SaleItem'
        payment:
