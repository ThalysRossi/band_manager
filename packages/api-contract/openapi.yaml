        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SaleItem:
      type: object
      required:
        - id
        - saleId
        - productId
        - variantId
        - productName
        - category
        - size
        - colour
        - quantity
        - unitPrice
        - unitCost
        - lineTotal
        - expectedProfit
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        saleId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
        productName:
          type: string
        category:
          $ref: '#/components/schemas/InventoryCategory'
        size:
          $ref: '#/components/schemas/InventorySize'
        colour:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          $ref: '#/components/schemas/Money'
        unitCost:
          $ref: '#/components/schemas/Money'
        lineTotal:
          $ref: '#/components/schemas/Money'
        expectedProfit:
          $ref: '#/components/schemas/SignedMoney'
        createdAt:
          type: string
          format: date-time
    Payment:
      type: object
      required:
        - id
        - saleId
        - method
        - status
        - amount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        saleId:
          type: string
          format: uuid
        method:
          type: string
          enum:
            - cash
            - pix
            - card
        status:
          type: string
          enum:
            - provider_pending
            - action_required
            - processing
            - confirmed
            - failed
            - canceled
            - expired
        amount:
          $ref: '#/components/schemas/Money'
        provider:
          type: string
        providerOrderId:
          type: string
        providerPaymentId:
          type: string
        providerReferenceId:
          type: string
        externalReference:
          type: string
        providerStatus:
          type: string
        providerStatusDetail:
          type: string
        expiresAt:
          type: string
          format: date-time
        pixQrCode:
          type: string
        pixQrCodeBase64:
          type: string
        pixTicketUrl:
          type: string
        pointTerminalId:
          type: string
        cardPaymentType:
          type: string
          enum:
            - credit_card
            - debit_card
        cardInstallments:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Transaction:
      type: object
      required:
        - id
        - saleId
        - saleItemId
        - amount
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        saleId:
          type: string
          format: uuid
        saleItemId:
          type: string
          format: uuid
        amount:
          $ref: '#/components/schemas/Money'
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
